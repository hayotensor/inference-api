services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inference
      POSTGRES_USER: inference
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inference -d inference"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./inference-mono/api
    env_file:
      - ./inference-mono/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  inference_api:
    build:
      context: ./inference-mono/inference_api
    env_file:
      - ./inference-mono/inference_api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8001"
    command: >
      uvicorn inference_api.main:app --host 0.0.0.0 --port 8001
    restart: unless-stopped

  ui:
    build:
      context: ./inference-mono/ui
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_INFERENCE_API_BASE_URL: ${NEXT_PUBLIC_INFERENCE_API_BASE_URL}
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:-}
    depends_on:
      api:
        condition: service_started
      inference_api:
        condition: service_started
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
